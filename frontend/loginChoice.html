<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Login Type</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page-split">

    <section class="panel panel-left">
        <div class="brand">
            <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 11.5a8.38 8.38 0 0 1-1.9 5.4L21 21l-4.6-1.2A8.5 8.5 0 1 1 21 11.5Z"/>
                <circle cx="8.5" cy="11.5" r="1" fill="currentColor" stroke="none"/>
                <circle cx="12" cy="11.5" r="1" fill="currentColor" stroke="none"/>
                <circle cx="15.5" cy="11.5" r="1" fill="currentColor" stroke="none"/>
            </svg>
            Feedback Collection System
        </div>

        <h1>Choose Login Type</h1>
        <p class="welcome-text">Select whether you want to log in as a user or an admin, then continue to the appropriate login screen.</p>

    </section>

    <section class="panel panel-right">
        <span class="eyebrow">Login Selection</span>
        <h1>Log in your way</h1>
        <p class="welcome-text">Pick the login path that matches your role before continuing.</p>

        <div class="actions">
            <a href="login.html"><button>User Login</button></a>
            <a href="adminLogin.html"><button>Admin Login</button></a>
            <a href="index.html"><button class="btn-secondary">Back to Home</button></a>
        </div>
    </section>

</div>
